version: "3.9"

services:
  mariadb:
    image: mariadb:11
    container_name: it_service_mariadb
    restart: unless-stopped

    environment:
      MARIADB_ROOT_PASSWORD: rootpassword
      MARIADB_DATABASE: it_service
      MARIADB_USER: it_user
      MARIADB_PASSWORD: strongpassword
      TZ: Australia/Sydney

    ports:
      - "3309:3306"

    volumes:
      - mariadb_data:/var/lib/mysql

    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "127.0.0.1", "-uroot", "-prootpassword"]
      interval: 5s
      timeout: 3s
      retries: 30

volumes:
  mariadb_data: